services:
  web-ai-coding-agent-lab:
    build: .
    image: web-ai-coding-agent-lab:latest
    ports:
      - '8787:8787'
    environment:
      # Provide your DeepSeek key here or via a .env file next to this compose file.
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      deepseek_KEY: ${deepseek_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      WAC_SESSION_LOG_PATH: /app/data/session-log.json
    volumes:
      # Persist local session log across restarts.
      - web-ai-coding-agent-lab-data:/app/data
    restart: unless-stopped

volumes:
  web-ai-coding-agent-lab-data:
